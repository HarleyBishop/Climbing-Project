<div id="erd" style="padding: 1rem 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f1efe8',
    primaryTextColor: dark ? '#e8e6dc' : '#2c2c2a',
    primaryBorderColor: dark ? '#5f5e5a' : '#888780',
    attributeBackgroundColorEven: dark ? '#232321' : '#f8f7f2',
    attributeBackgroundColorOdd: dark ? '#1e1e1c' : '#ffffff',
  },
});
const diagram = `erDiagram
  GYM {
    uuid id PK
    string name
    string location
    string slug
    bool is_active
    timestamp created_at
  }
  WALL {
    uuid id PK
    uuid gym_id FK
    string name
    string description
  }
  CLIMB {
    uuid id PK
    uuid wall_id FK
    uuid added_by FK
    string name
    string colour
    string image_url
    int suggested_grade
    float community_grade
    bool is_archived
    timestamp set_at
    timestamp archived_at
  }
  USER {
    uuid id PK
    string username
    string email
    string password_hash
    bool is_admin
    bool is_verified_setter
    timestamp created_at
  }
  GRADE_VOTE {
    uuid id PK
    uuid climb_id FK
    uuid user_id FK
    int grade
    timestamp created_at
  }
  REVIEW {
    uuid id PK
    uuid climb_id FK
    uuid user_id FK
    string comment
    int stars
    timestamp created_at
  }
  VIDEO {
    uuid id PK
    uuid climb_id FK
    uuid user_id FK
    string video_url
    string thumbnail_url
    timestamp uploaded_at
  }
  GYM ||--o{ WALL : "has"
  WALL ||--o{ CLIMB : "contains"
  USER ||--o{ CLIMB : "sets"
  CLIMB ||--o{ GRADE_VOTE : "receives"
  CLIMB ||--o{ REVIEW : "has"
  CLIMB ||--o{ VIDEO : "has"
  USER ||--o{ GRADE_VOTE : "casts"
  USER ||--o{ REVIEW : "writes"
  USER ||--o{ VIDEO : "uploads"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});

const headerTextColor = dark ? '#e8e6dc' : '#2c2c2a';
document.querySelectorAll('#erd svg .entityLabel, #erd svg .er.entityLabel').forEach(el => {
  el.style.fill = headerTextColor;
  el.setAttribute('fill', headerTextColor);
});
document.querySelectorAll('#erd svg text').forEach(el => {
  const parent = el.closest('.entityBox, .entity-name, [class*="entityLabel"]');
  if (parent) {
    el.setAttribute('fill', headerTextColor);
  }
});
</script>
